site_name: TTRPG SRD
site_url: https://rules.omnisgm.com/
site_description: "D&D SRD 5.2.1, 5.1, Daggerheart SRD 1.0 и BRP SRD 1.0 на русском и английском — заклинания, классы, монстры, магические предметы, правила. Скачать PDF или читать онлайн."
site_author: Nemo Illusionist

docs_dir: docs

theme:
  name: material
  language: ru
  custom_dir: overrides
  favicon: assets/favicon.svg
  icon:
    logo: material/dice-d20
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Тёмная тема
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Светлая тема
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - toc.integrate

plugins:
  - i18n:
      docs_structure: folder
      languages:
        - locale: ru
          name: Русский
          default: true
          build: true
        - locale: en
          name: English
          build: true
          theme:
            language: en
          nav_translations:
            Главная: Home
            Правовая информация: Legal Information
            Как играть: Playing the Game
            Создание персонажа: Character Creation
            Классы: Classes
            Варвар: Barbarian
            Бард: Bard
            Жрец: Cleric
            Друид: Druid
            Воин: Fighter
            Монах: Monk
            Паладин: Paladin
            Следопыт: Ranger
            Плут: Rogue
            Чародей: Sorcerer
            Колдун: Warlock
            Волшебник: Wizard
            Происхождение персонажа: Character Origins
            Черты: Feats
            Снаряжение: Equipment
            Заклинания: Spells
            Глоссарий правил: Rules Glossary
            Инструментарий: Gameplay Toolbox
            Магические предметы: Magic Items
            Монстры: Monsters
            "Монстры от А до Я": "Monsters A\u2013Z"
            Животные: Animals
            Глоссарий: Glossary
            Термины: Terms
            "Заклинания (справочник)": "Spells (Reference)"
            "Магические предметы (справочник)": "Magic Items (Reference)"
            "Монстры (справочник)": "Monsters (Reference)"
            "Животные (справочник)": "Animals (Reference)"
            Способности: Abilities
            Приключения: Adventuring
            Бой: Combat
            Расы: Races
            Детали персонажа: Character Details
            Мультиклассирование: Multiclassing
            Состояния: Conditions
            Инструментарий мастера: Gamemastering Toolbox
            "Конвертация в SRD 5.2.1": "Converting to SRD 5.2.1"
            Введение: Introduction
            Домены: Domains
            Происхождения: Ancestries
            Сообщества: Communities
            Основные механики: Core Mechanics
            Оружие: Weapons
            Броня: Armor
            Добыча: Loot
            Расходники: Consumables
            Руководство мастера: GM Guide
            Противники: Adversaries
            Окружения: Environments
            Витервилд: The Witherwild
            Справочник доменных карт: Domain Card Reference
            "Способности (справочник)": "Abilities (Reference)"
            "Противники (справочник)": "Adversaries (Reference)"
            "Оружие (справочник)": "Weapons (Reference)"
            "Броня (справочник)": "Armor (Reference)"
            "Происхождения (справочник)": "Ancestries (Reference)"
            "Предметы (справочник)": "Items (Reference)"
            "Расходники (справочник)": "Consumables (Reference)"
            "Сообщества (справочник)": "Communities (Reference)"
            Страж: Guardian
            Серафим: Seraph
            Воитель: Warrior
            Система: System
            Время: Time
            Точечные правила: Spot Rules
            Пример противника: Sample Foe
            Создание персонажа (BRP): Character Creation
            Лист персонажа: Character Sheet
            "Глоссарий (BRP)": "Glossary (BRP)"
            Термины: Terms
            Навыки: Skills
            Оружие: Weapons
            Броня: Armor
            Профессии: Professions
  - search:
      lang:
        - ru
        - en
  - minify:
      minify_html: true

markdown_extensions:
  - toc:
      permalink: true
      toc_depth: 2
  - tables
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

