name: Deploy to Firebase Hosting

# Заменяет прежний pages.yml (GitHub Pages / MkDocs). Сайт — Astro (web/), статика → Firebase
# Hosting (проект omnisgm-rules). Сборку Astro + генерацию JSON API делает firebase predeploy
# (см. firebase.json). Релизные воркфлоу (release*.yml, PDF) этим не затрагиваются.
on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'src/**'
      - 'config/**'
      - '.github/scripts/generate_api.py'
      - 'firebase.json'
  workflow_dispatch:

permissions:
  contents: read
  packages: read   # установка приватного @omnisgm-app/brand из GitHub Packages

concurrency:
  group: deploy-hosting
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web deps
        working-directory: web
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install API generator deps
        run: pip install jsonschema

      - name: Write service account
        run: printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      # firebase deploy запускает predeploy: astro build (с VITE_FIREBASE_* из секретов) + gen API
      - name: Build & deploy
        run: npx --yes firebase-tools@latest deploy --only hosting --project omnisgm-rules --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      # Сброс edge-кэша Cloudflare после деплоя — точечно, фикс-имена на rules.omnisgm.com
      # (иконки/favicon/manifest/sw/og кэшируются на edge; HTML/хэш-ассеты не трогаем).
      # Без секретов CLOUDFLARE_* шаг тихо пропускается.
      - name: Purge Cloudflare cache
        if: success()
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          if [ -z "$CF_API_TOKEN" ] || [ -z "$CF_ZONE_ID" ]; then
            echo "Cloudflare-секреты не заданы — purge пропущен."
            exit 0
          fi
          base="https://rules.omnisgm.com"
          files=$(printf '"%s",' \
            "$base/favicon.svg" "$base/icon.svg" "$base/maskable.svg" \
            "$base/icon-192.png" "$base/icon-512.png" \
            "$base/maskable-192.png" "$base/maskable-512.png" \
            "$base/apple-touch-icon.png" "$base/og.png" \
            "$base/manifest.webmanifest" "$base/sw.js")
          resp=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data "{\"files\":[${files%,}]}")
          echo "$resp"
          echo "$resp" | grep -q '"success":true' || { echo "❌ Cloudflare purge не удался"; exit 1; }
          echo "✔ Cloudflare: edge-кэш фикс-файлов rules.omnisgm.com сброшен"
