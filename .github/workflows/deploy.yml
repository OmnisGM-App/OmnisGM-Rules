name: Deploy to Firebase Hosting

# Заменяет прежний pages.yml (GitHub Pages / MkDocs). Сайт — Astro (web/), статика → Firebase
# Hosting (проект omnisgm-rules). Сборку Astro + генерацию JSON API делает firebase predeploy
# (см. firebase.json). Релизные воркфлоу (release*.yml, PDF) этим не затрагиваются.
on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'src/**'
      - 'config/**'
      - '.github/scripts/generate_api.py'
      - 'firebase.json'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-hosting
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web deps
        working-directory: web
        run: npm ci

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install API generator deps
        run: pip install jsonschema

      - name: Write service account
        run: printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      # firebase deploy запускает predeploy: astro build (с VITE_FIREBASE_* из секретов) + gen API
      - name: Build & deploy
        run: npx --yes firebase-tools@latest deploy --only hosting --project omnisgm-rules --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
