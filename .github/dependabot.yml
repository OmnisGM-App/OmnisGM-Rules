version: 2
updates:
  # npm-зависимости Astro-приложения (web/). Minor+patch батчим в один PR, чтобы не шумело.
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    ignore:
      # версию бренд-кита бампаем вручную (приватный GitHub Packages)
      - dependency-name: "@omnisgm-app/brand"
  # версии GitHub Actions в workflow'ах
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
